  Offline Dagster API reference. Curated cheatsheet + 8 runnable
  examples + SMAK-indexable corpus, pinned to Dagster 1.13.3.

  Other personalities (dagster-operator, dagster-tutor) consult
  this BEFORE generating Dagster API code from training memory —
  kills the "confidently wrong" failure mode.

  Includes 1 skill: lookup-api (offline discovery sequence:
  cheatsheet → examples → pydoc → help → dir → source). Refuses
  to reach into dagster._core.* / _internal.*.

  After import, run `mcp__smak__ingest` with
  database/dagster-1.13.3/workspace_config.yaml to build vector
  indices for semantic search. Two indices: cheatsheet (12 docs)
  and examples (8 files).

# After import, run: mcp__smak__ingest with this config to build vector indices.
# SMAK_DATA defaults to a path next to this file; override via env if needed.

env:
  SMAK_DATA: ./.smak

indices:
  - name: cheatsheet
    description: Curated Dagster 1.13.3 reference markdown — public API surface plus every gotcha encountered. The agent should consult this BEFORE generating any Dagster API code from training memory.
    paths:
      - ./docs
    uri: $SMAK_DATA/cheatsheet

  - name: examples
    description: Runnable Dagster 1.13.3 Python examples — minimal asset patterns, deps styles, partitions, run config, retries, cross-location. All smoke-tested under `dagster definitions validate`. Use as ground truth when cheatsheet entries are ambiguous.
    paths:
      - ./examples
    uri: $SMAK_DATA/examples

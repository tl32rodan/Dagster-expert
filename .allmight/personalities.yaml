personalities:
- name: dagster-expert
  capabilities:
  - database
  - memory
  versions:
    database: 1.0.0
    memory: 1.0.0
  # Three All-Might v3 source bundles merged into this v4 personality.
  # Full lineage and per-source contribution summary in
  # personalities/dagster-expert/manifest.yaml::derived_from.
  derived_from:
  - dagster-operator
  - dagster-tutor
  - dagster-librarian
- name: flow-cartographer
  capabilities:
  - memory
  - schedule
  versions:
    memory: 1.0.0
    schedule: 1.0.0
  # Evolved in-place from the retired `dagster-ap-auditor` (a reactive
  # Dagster<->AP acceptance gatekeeper). Now: given any execution flow,
  # runs a scheduled plan->build->verify->reflect loop until CONVERSION.md
  # success criteria are met. The gatekeeper's mechanical guardrails
  # survive as the `verify` tick's self-check. Reads dagster-expert's
  # database/learn/demo material as ground truth; never duplicates it.
  # See personalities/flow-cartographer/manifest.yaml::derived_from.
  derived_from:
  - dagster-ap-auditor
  - dagster-expert

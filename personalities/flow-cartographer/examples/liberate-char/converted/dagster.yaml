# Instance config (lives in $DAGSTER_HOME). Air-gap essentials per
# STANDARD_USAGE 7.1: default launcher, queued coordinator with concurrency
# caps (this is how parallelism is bounded -- NOT a custom launcher), no
# telemetry, run monitoring on.
run_launcher:
  module: dagster._core.launcher
  class: DefaultRunLauncher

run_coordinator:
  module: dagster._core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 8
    tag_concurrency_limits:
      - key: "dagster/concurrency_key"
        value: "liberate_run"
        limit: 4

run_monitoring:
  enabled: true

telemetry:
  enabled: false
